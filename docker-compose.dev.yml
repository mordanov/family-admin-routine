services:
  admin-routine-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - backups_data:/app/backups
    environment:
      SECRET_KEY: dev-secret-key-not-for-production
      BACKUPS_DIR: /app/backups
      ADMIN_USER1_USERNAME: admin1
      ADMIN_USER1_PASSWORD: password1
      ADMIN_USER2_USERNAME: admin2
      ADMIN_USER2_PASSWORD: password2
      RECIPES_DB_HOST: ${RECIPES_DB_HOST:-recipes-db}
      RECIPES_POSTGRES_DB: ${RECIPES_POSTGRES_DB:-}
      RECIPES_POSTGRES_USER: ${RECIPES_POSTGRES_USER:-}
      RECIPES_POSTGRES_PASSWORD: ${RECIPES_POSTGRES_PASSWORD:-}
      POETRY_DB_HOST: ${POETRY_DB_HOST:-recipes-db}
      POETRY_POSTGRES_DB: ${POETRY_POSTGRES_DB:-}
      POETRY_POSTGRES_USER: ${POETRY_POSTGRES_USER:-}
      POETRY_POSTGRES_PASSWORD: ${POETRY_POSTGRES_PASSWORD:-}
      NEWS_DB_HOST: ${NEWS_DB_HOST:-recipes-db}
      NEWS_POSTGRES_DB: ${NEWS_POSTGRES_DB:-}
      NEWS_POSTGRES_USER: ${NEWS_POSTGRES_USER:-}
      NEWS_POSTGRES_PASSWORD: ${NEWS_POSTGRES_PASSWORD:-}
      BUDGET_DB_HOST: ${BUDGET_DB_HOST:-recipes-db}
      BUDGET_POSTGRES_DB: ${BUDGET_POSTGRES_DB:-}
      BUDGET_POSTGRES_USER: ${BUDGET_POSTGRES_USER:-}
      BUDGET_POSTGRES_PASSWORD: ${BUDGET_POSTGRES_PASSWORD:-}
      REMINDERS_DB_HOST: ${REMINDERS_DB_HOST:-recipes-db}
      REMINDERS_POSTGRES_DB: ${REMINDERS_POSTGRES_DB:-}
      REMINDERS_POSTGRES_USER: ${REMINDERS_POSTGRES_USER:-}
      REMINDERS_POSTGRES_PASSWORD: ${REMINDERS_POSTGRES_PASSWORD:-}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  admin-routine-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host

volumes:
  backups_data:
